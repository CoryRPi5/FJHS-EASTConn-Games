<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firefighter Invaders</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
    margin:0;
    overflow:hidden;
    background:#0b0f2a;
    font-family:'Press Start 2P', cursive;
    color:white;
}

canvas{
    display:block;
    margin:0 auto;
    background:linear-gradient(#0b0f2a 70%, #111 70%);
    image-rendering:pixelated;
    cursor:crosshair;
}

.screen{
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

button{
    font-family:'Press Start 2P';
    margin-top:20px;
    padding:15px 25px;
    background:#ff4444;
    color:white;
    cursor:pointer;
    border:4px solid #ffffff;
    border-radius:8px;
    box-shadow:4px 4px 0px #880000;
    image-rendering:pixelated;
}

button:active{
    transform:translate(4px,4px);
    box-shadow:none;
}

#ui{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
}
</style>
</head>
<body>

<div id="startScreen" class="screen">
    <h1>🚒 Firefighter Invaders</h1>
    <button onclick="showInstructions()">PLAY</button>
</div>

<div id="instructionScreen" class="screen" style="display:none;">
    <p style="max-width:700px; line-height:1.8;">
        Collect falling power ups to upgrade your firetruck for a short amount of time! Good luck!
    </p>
    <button onclick="startGame()">START</button>
</div>

<div id="gameOverScreen" class="screen" style="display:none;">
    <h1>GAME OVER</h1>
    <p id="finalScore"></p>
    <button onclick="restartGame()">RESTART</button>
</div>

<div id="ui"></div>
<canvas id="gameCanvas" width="900" height="600"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const ui=document.getElementById("ui");

let player, bullets, fires, powerUps, houses;
let score=0, level=1;
let health=100;
let fireDirection=1, fireSpeed=0.6;
let lastShot=0;
let tripleShot=false, sixShot=false, nineShot=false, frenzy=false;
let powerTimer=0;
let gameState="menu";

let keys={a:false,d:false};

class Player{
    constructor(){
        this.x=canvas.width/2;
        this.y=canvas.height-90;
        this.speed=6;
    }
    update(){
        if(keys.a) this.x-=this.speed;
        if(keys.d) this.x+=this.speed;
        if(this.x<20) this.x=20;
        if(this.x>canvas.width-20) this.x=canvas.width-20;
    }
    draw(){
        ctx.fillStyle="#cc0000";
        ctx.fillRect(this.x-20,this.y-20,40,40);
        ctx.fillStyle="#ffff00";
        ctx.fillRect(this.x-10,this.y-35,20,15);
    }
}

class House{
    constructor(x){ this.x=x; this.y=canvas.height-60; this.onFire=false; }
    draw(){
        ctx.fillStyle="#4444aa";
        ctx.fillRect(this.x-40,this.y-40,80,40);
        ctx.fillStyle="#333";
        ctx.fillRect(this.x-50,this.y-50,100,20);
        if(this.onFire){
            ctx.fillStyle="orange";
            ctx.fillRect(this.x-20,this.y-70,40,30);
        }
    }
}

class Bullet{
    constructor(x,y,dx=0){ this.x=x; this.y=y; this.dx=dx; this.speed=14; }
    update(){ this.y-=this.speed; this.x+=this.dx; }
    draw(){
        ctx.fillStyle="#00ffff";
        ctx.fillRect(this.x-3,this.y,6,18);
    }
}

class Fire{
    constructor(x,y,hp){
        this.x=x; this.y=y; this.hp=hp;
        let roll=Math.random();
        if(level > 10 && roll<0.03) this.drop="nine";
        else if(roll<0.06) this.drop="frenzy";
        else if(roll<0.13) this.drop="six";
        else if(roll<0.28) this.drop="triple";
        else this.drop=null;
    }
    draw(){
        ctx.fillStyle=this.hp>2?"#aa00ff":"#ff6600";
        ctx.fillRect(this.x-15,this.y-15,30,30);
        ctx.fillStyle="#ffff00";
        ctx.fillRect(this.x-8,this.y-8,16,16);
    }
}

class PowerUp{
    constructor(x,y,type){ this.x=x; this.y=y; this.type=type; }
    update(){ this.y+=3; }
    draw(){
        if(this.type==="triple") ctx.fillStyle="lime";
        if(this.type==="six") ctx.fillStyle="cyan";
        if(this.type==="frenzy") ctx.fillStyle="red";
        if(this.type==="nine") ctx.fillStyle="magenta";
        ctx.fillRect(this.x-10,this.y-10,20,20);
    }
}

function initGame(){
    player=new Player();
    bullets=[]; fires=[]; powerUps=[];
    houses=[new House(250),new House(650)];
    spawnWave();
}

function spawnWave(){
    let rows=2+Math.floor(level/2);
    let cols=6+Math.floor(level/3);
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let hp=1+Math.floor(level/4);
            fires.push(new Fire(150+c*60,100+r*50,hp));
        }
    }
}

function gameLoop(){
    if(gameState!=="playing") return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="red";
    ctx.fillRect(20,20,200,20);
    ctx.fillStyle="lime";
    ctx.fillRect(20,20,200*(health/100),20);
    ctx.strokeStyle="white";
    ctx.strokeRect(20,20,200,20);

    houses.forEach(h=>h.draw());
    player.update();
    player.draw();

    if(frenzy && Date.now()-lastShot>60){
        if(level>10){
            bullets.push(new Bullet(player.x,player.y-20,-4));
            bullets.push(new Bullet(player.x,player.y-20,0));
            bullets.push(new Bullet(player.x,player.y-20,4));
        } else {
            bullets.push(new Bullet(player.x,player.y-20,0));
        }
        lastShot=Date.now();
    }

    bullets.forEach((b,i)=>{
        b.update();
        b.draw();
        if(b.y<0) bullets.splice(i,1);
    });

    powerUps.forEach((p,i)=>{
        p.update();
        p.draw();
        if(Math.abs(p.x-player.x)<30 && Math.abs(p.y-player.y)<30){
            activatePower(p.type);
            powerUps.splice(i,1);
        }
    });

    let edge=false;
    fires.forEach((f,i)=>{
        f.x+=fireSpeed*fireDirection;
        if(f.x<40||f.x>canvas.width-40) edge=true;

        if(f.y >= canvas.height-80){
            health -= 10;
            fires.splice(i,1);
            if(health <= 0) triggerGameOver();
            return;
        }

        f.draw();
    });

    if(edge){
        fireDirection*=-1;
        fires.forEach(f=>f.y+=15);
    }

    checkCollisions();

    if(fires.length===0){
        level++;
        fireSpeed+=0.2;
        spawnWave();
    }

    if(powerTimer>0){
        powerTimer--;
        if(powerTimer<=0){
            tripleShot=false;
            sixShot=false;
            nineShot=false;
            frenzy=false;
        }
    }

    ui.innerHTML=`SCORE ${score} | LEVEL ${level}`;
    requestAnimationFrame(gameLoop);
}

function shoot(){
    if(nineShot){
        for(let i=-4;i<=4;i++)
            bullets.push(new Bullet(player.x, player.y-20, i*2));
    }
    else if(sixShot){
        for(let i=-3;i<=3;i+=2)
            bullets.push(new Bullet(player.x, player.y-20, i*2));
    }
    else if(tripleShot){
        bullets.push(new Bullet(player.x,player.y-20,-4));
        bullets.push(new Bullet(player.x,player.y-20,0));
        bullets.push(new Bullet(player.x,player.y-20,4));
    }
    else{
        bullets.push(new Bullet(player.x,player.y-20,0));
    }
}

function activatePower(type){
    tripleShot=false;
    sixShot=false;
    nineShot=false;
    frenzy=false;

    if(type==="triple"){ tripleShot=true; powerTimer=900; }
    if(type==="six"){ sixShot=true; powerTimer=800; }
    if(type==="nine"){ nineShot=true; powerTimer=700; }
    if(type==="frenzy"){ frenzy=true; powerTimer=400; }
}

function checkCollisions(){
    bullets.forEach((b,bi)=>{
        fires.forEach((f,fi)=>{
            if(Math.abs(b.x-f.x)<20 && Math.abs(b.y-f.y)<20){
                f.hp--;
                bullets.splice(bi,1);
                if(f.hp<=0){
                    score+=10;
                    if(f.drop) powerUps.push(new PowerUp(f.x,f.y,f.drop));
                    fires.splice(fi,1);
                }
            }
        });
    });
}

function triggerGameOver(){
    gameState="gameover";
    document.getElementById("finalScore").innerText="FINAL SCORE: "+score;
    document.getElementById("gameOverScreen").style.display="flex";
}

function showInstructions(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("instructionScreen").style.display="flex";
}

function startGame(){
    document.getElementById("instructionScreen").style.display="none";
    gameState="playing";
    score=0;
    level=1;
    health=100;
    fireSpeed=0.6;
    initGame();
    gameLoop();
}

function restartGame(){
    document.getElementById("gameOverScreen").style.display="none";
    startGame();
}

/* UPDATED CONTROLS */

window.addEventListener("keydown",(e)=>{
    if(e.key==="a"||e.key==="A"||e.key==="ArrowLeft") keys.a=true;
    if(e.key==="d"||e.key==="D"||e.key==="ArrowRight") keys.d=true;

    if(e.code==="Space"){
        if(gameState==="playing" && !frenzy && Date.now()-lastShot>250){
            shoot();
            lastShot=Date.now();
        }
    }
});

window.addEventListener("keyup",(e)=>{
    if(e.key==="a"||e.key==="A"||e.key==="ArrowLeft") keys.a=false;
    if(e.key==="d"||e.key==="D"||e.key==="ArrowRight") keys.d=false;
});

/* MOUSE SHOOT */
canvas.addEventListener("mousedown", ()=>{
    if(gameState==="playing" && !frenzy && Date.now()-lastShot>250){
        shoot();
        lastShot=Date.now();
    }
});

/* MOUSE MOVE */
canvas.addEventListener("mousemove",(e)=>{
    const rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left;
});
</script>

</body>
</html>
