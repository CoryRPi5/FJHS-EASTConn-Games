<!DOCTYPE html>
<html>
<head>
<title>Simple Tetris</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: monospace;
  text-align: center;
}

canvas {
  background: #000;
  display: block;
  margin: 20px auto;
  border: 3px solid #444;
}

#ui {
  font-size: 18px;
}
</style>
</head>
<body>

<h1>Tetris</h1>
<div id="ui">
  Score: <span id="score">0</span> |
  High Score: <span id="highscore">0</span>
</div>

<canvas id="game" width="240" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 10;
const ROWS = 20;
const BLOCK = 20;

let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

let score = 0;
let highscore = localStorage.getItem("tetrisHigh") || 0;

document.getElementById("highscore").textContent = highscore;

// Tetromino shapes
const pieces = [
  [[1,1,1,1]], // I
  [[1,1],[1,1]], // O
  [[0,1,0],[1,1,1]], // T
  [[1,0,0],[1,1,1]], // J
  [[0,0,1],[1,1,1]], // L
  [[1,1,0],[0,1,1]], // S
  [[0,1,1],[1,1,0]]  // Z
];

function randomPiece() {
  const shape = pieces[Math.floor(Math.random() * pieces.length)];
  return {
    shape,
    x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2),
    y: 0
  };
}

let current = randomPiece();

function drawBlock(x, y) {
  ctx.fillStyle = "#0ff";
  ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK - 1, BLOCK - 1);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw board
  board.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) drawBlock(x, y);
    });
  });

  // Draw current piece
  current.shape.forEach((row, dy) => {
    row.forEach((value, dx) => {
      if (value) drawBlock(current.x + dx, current.y + dy);
    });
  });
}

function collide() {
  return current.shape.some((row, dy) => {
    return row.some((value, dx) => {
      if (!value) return false;
      let x = current.x + dx;
      let y = current.y + dy;
      return (
        x < 0 ||
        x >= COLS ||
        y >= ROWS ||
        (y >= 0 && board[y][x])
      );
    });
  });
}

function merge() {
  current.shape.forEach((row, dy) => {
    row.forEach((value, dx) => {
      if (value) {
        board[current.y + dy][current.x + dx] = 1;
      }
    });
  });
}

function clearLines() {
  let lines = 0;
  board = board.filter(row => {
    if (row.every(cell => cell)) {
      lines++;
      return false;
    }
    return true;
  });

  while (board.length < ROWS) {
    board.unshift(Array(COLS).fill(0));
  }

  if (lines > 0) {
    score += lines * 100;
    document.getElementById("score").textContent = score;

    if (score > highscore) {
      highscore = score;
      localStorage.setItem("tetrisHigh", highscore);
      document.getElementById("highscore").textContent = highscore;
    }
  }
}

function resetGame() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  score = 0;
  document.getElementById("score").textContent = score;
}

function drop() {
  current.y++;
  if (collide()) {
    current.y--;
    merge();
    clearLines();
    current = randomPiece();

    if (collide()) {
      alert("Game Over!");
      resetGame();
    }
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") {
    current.x--;
    if (collide()) current.x++;
  } else if (e.key === "ArrowRight") {
    current.x++;
    if (collide()) current.x--;
  } else if (e.key === "ArrowDown") {
    drop();
  } else if (e.key === "ArrowUp") {
    // rotate
    const rotated = current.shape[0].map((_, i) =>
      current.shape.map(row => row[i]).reverse()
    );
    const old = current.shape;
    current.shape = rotated;
    if (collide()) current.shape = old;
  }
});

let lastTime = 0;
function update(time = 0) {
  if (time - lastTime > 500) {
    drop();
    lastTime = time;
  }
  draw();
  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
