<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Midnight Snack Frenzy</title>

<style>
body{
margin:0;
background:#000;
font-family:monospace;
color:#0ff;
text-align:center;
}

h1{
margin:10px 0;
color:#ff00ff;
text-shadow:0 0 15px #ff00ff;
}

#ui{
margin-bottom:10px;
}

canvas{
background:#111;
border:4px solid #0ff;
box-shadow:0 0 25px #0ff;
display:block;
margin:0 auto;
}

#gameOver{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:20px;
border:3px solid red;
color:red;
}

button{
padding:8px 15px;
font-family:monospace;
background:#111;
color:#0ff;
border:2px solid #0ff;
cursor:pointer;
}

button:hover{
background:#0ff;
color:#000;
}
</style>
</head>
<body>

<h1>MIDNIGHT SNACK FRENZY</h1>

<div id="ui">
Score: <span id="score">0</span> |
Lives: <span id="lives">3</span> |
High Score: <span id="highScore">0</span>
</div>

<canvas id="game" width="600" height="600"></canvas>

<div id="gameOver">
<h2>GAME OVER</h2>
<button onclick="restartGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const highScoreEl = document.getElementById("highScore");
const gameOverScreen = document.getElementById("gameOver");

let score = 0;
let lives = 3;
let highScore = localStorage.getItem("snackHighScore") || 0;
highScoreEl.textContent = highScore;

let mouse = {x:300,y:300};

let player = {
x:300,
y:300,
radius:18,
speed:3,
angle:0
};

let ghost = {
x:50,
y:50,
radius:20,
speed:1.5
};

let pellets = [];

/* Spawn concession food */
function spawnFood(){
pellets = [];
for(let i=0;i<30;i++){
pellets.push({
x:Math.random()*560+20,
y:Math.random()*560+20,
type:Math.floor(Math.random()*4)
});
}
}
spawnFood();

/* Mouse control */
canvas.addEventListener("mousemove", e=>{
const rect = canvas.getBoundingClientRect();
mouse.x = e.clientX - rect.left;
mouse.y = e.clientY - rect.top;
});

/* Draw Player */
function drawPlayer(){
ctx.save();
ctx.translate(player.x, player.y);
ctx.rotate(player.angle);

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(0,0,player.radius,0.3,Math.PI*2-0.3);
ctx.lineTo(0,0);
ctx.fill();

ctx.restore();
}

/* Improved Ghost */
function drawGhost(){

ctx.fillStyle="cyan";

// Head
ctx.beginPath();
ctx.arc(ghost.x, ghost.y-10, 20, Math.PI, 0);
ctx.lineTo(ghost.x+20, ghost.y+10);

// Wavy bottom
ctx.lineTo(ghost.x+10, ghost.y+20);
ctx.lineTo(ghost.x, ghost.y+10);
ctx.lineTo(ghost.x-10, ghost.y+20);
ctx.lineTo(ghost.x-20, ghost.y+10);

ctx.closePath();
ctx.fill();

// Eyes
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ghost.x-7, ghost.y-5, 6, 0, Math.PI*2);
ctx.arc(ghost.x+7, ghost.y-5, 6, 0, Math.PI*2);
ctx.fill();

// Pupils track player
let dx = player.x - ghost.x;
let dy = player.y - ghost.y;
let angle = Math.atan2(dy, dx);

ctx.fillStyle="blue";
ctx.beginPath();
ctx.arc(ghost.x-7 + Math.cos(angle)*2, ghost.y-5 + Math.sin(angle)*2, 3, 0, Math.PI*2);
ctx.arc(ghost.x+7 + Math.cos(angle)*2, ghost.y-5 + Math.sin(angle)*2, 3, 0, Math.PI*2);
ctx.fill();
}

/* Pixel Concession Food */
function drawFood(){
pellets.forEach(p=>{
if(p.type===0){ // Popcorn
ctx.fillStyle="red";
ctx.fillRect(p.x-10,p.y-6,20,12);
ctx.fillStyle="yellow";
ctx.fillRect(p.x-8,p.y-14,16,8);
}

if(p.type===1){ // Soda
ctx.fillStyle="blue";
ctx.fillRect(p.x-6,p.y-10,12,20);
ctx.fillStyle="white";
ctx.fillRect(p.x-8,p.y-12,16,4);
ctx.fillStyle="pink";
ctx.fillRect(p.x+2,p.y-18,3,8);
}

if(p.type===2){ // Hotdog
ctx.fillStyle="brown";
ctx.fillRect(p.x-12,p.y-4,24,8);
ctx.fillStyle="orange";
ctx.fillRect(p.x-10,p.y-2,20,4);
}

if(p.type===3){ // Candy
ctx.fillStyle="purple";
ctx.fillRect(p.x-10,p.y-6,20,12);
ctx.fillStyle="yellow";
ctx.fillRect(p.x-6,p.y-2,12,4);
}
});
}

/* Movement */
function movePlayer(){
let dx = mouse.x - player.x;
let dy = mouse.y - player.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist > 1){
player.x += (dx/dist)*player.speed;
player.y += (dy/dist)*player.speed;
player.angle = Math.atan2(dy,dx);
}
}

function moveGhost(){
let dx = player.x - ghost.x;
let dy = player.y - ghost.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist>0){
ghost.x += (dx/dist)*ghost.speed;
ghost.y += (dy/dist)*ghost.speed;
}
}

/* Food collision */
function checkFoodCollision(){
pellets = pellets.filter(p=>{
let dx = player.x - p.x;
let dy = player.y - p.y;
let dist = Math.sqrt(dx*dx + dy*dy);
if(dist < player.radius){
score += 10;
scoreEl.textContent = score;
return false;
}
return true;
});

if(pellets.length===0){
spawnFood();
}
}

/* Ghost collision */
function checkGhostCollision(){
let dx = player.x - ghost.x;
let dy = player.y - ghost.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < player.radius + ghost.radius){
lives--;
livesEl.textContent = lives;

// Reset player
player.x=300;
player.y=300;

// Spawn ghost in random far corner
let corners = [
{x:50,y:50},
{x:550,y:50},
{x:50,y:550},
{x:550,y:550}
];

let randomCorner = corners[Math.floor(Math.random()*corners.length)];
ghost.x = randomCorner.x;
ghost.y = randomCorner.y;

if(lives<=0){
endGame();
}
}
}

/* Increase difficulty */
function increaseDifficulty(){
ghost.speed += 0.1;
}
setInterval(increaseDifficulty, 5000);

/* End game */
function endGame(){
if(score > highScore){
highScore = score;
localStorage.setItem("snackHighScore", highScore);
}
highScoreEl.textContent = highScore;
gameOverScreen.style.display="block";
}

/* Restart */
function restartGame(){
score=0;
lives=3;
ghost.speed=1.5;
scoreEl.textContent=0;
livesEl.textContent=3;
gameOverScreen.style.display="none";
spawnFood();

player.x=300;
player.y=300;

ghost.x=50;
ghost.y=50;
}

/* Main Loop */
function loop(){
ctx.clearRect(0,0,600,600);

drawFood();
drawPlayer();
drawGhost();

movePlayer();
moveGhost();
checkFoodCollision();
checkGhostCollision();

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
