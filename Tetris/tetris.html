<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Book Exchange Tetris</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background: radial-gradient(circle at center,#5a4634 0%,#3e2f22 50%,#1f1812 100%);
}

#game{
  display:flex;
  gap:20px;
  background:rgba(0,0,0,0.35);
  padding:20px;
  border-radius:10px;
}

canvas{
  border:6px solid #3a2a14;
  background:#6b4f2a;
}

h1{margin-top:0;font-size:20px}
</style>
</head>
<body>

<div id="game">
<canvas id="board" width="200" height="400"></canvas>
<div>
<h1>Book Exchange Tetris</h1>
<p>Stack the books neatly.</p>
<p>⬅ ➡ move</p>
<p>⬆ rotate</p>
<p>⬇ drop</p>
<p><b>Score:</b> <span id="score">0</span></p>
<p><b>High Score:</b> <span id="highscore">0</span></p>
</div>
</div>

<script>
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");
const highScoreEl=document.getElementById("highscore");

const COLS=10;
const ROWS=20;
const SIZE=20;

let score=0;

let highScore=localStorage.getItem("bookExchangeTetrisHighScore")||0;
highScoreEl.textContent=highScore;

const board=Array.from({length:ROWS},()=>Array(COLS).fill(0));

const colors=[
 null,
 "#e63946",
 "#457b9d",
 "#2a9d8f",
 "#f4a261",
 "#e9c46a",
 "#8d5a97",
 "#264653"
];

const pieces=[
 [],
 [[1,1,1,1]],
 [[2,2],[2,2]],
 [[0,3,0],[3,3,3]],
 [[4,0,0],[4,4,4]],
 [[0,0,5],[5,5,5]],
 [[0,6,6],[6,6,0]],
 [[7,7,0],[0,7,7]]
];

const bgBooks=[];
for(let i=0;i<canvas.width;i+=16){
  bgBooks.push({x:i,color:`hsl(${Math.random()*360},40%,45%)`});
}

function drawShelfBackground(){
  ctx.fillStyle="#6b4f2a";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#4e371c";
  for(let y=0;y<ROWS;y+=4){
    ctx.fillRect(0,y*SIZE+SIZE*3.7,canvas.width,6);
  }

  bgBooks.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,0,10,canvas.height);
  });
}

function drawCell(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);

  ctx.fillStyle="rgba(255,255,255,0.25)";
  ctx.fillRect(x*SIZE,y*SIZE,4,SIZE);

  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(x*SIZE,y*SIZE+SIZE-4,SIZE,4);
}

function draw(){
  drawShelfBackground();

  board.forEach((row,y)=>{
    row.forEach((v,x)=>{
      if(v) drawCell(x,y,colors[v]);
    });
  });

  player.matrix.forEach((row,y)=>{
    row.forEach((v,x)=>{
      if(v) drawCell(player.x+x,player.y+y,colors[v]);
    });
  });
}

function collide(board,p){
  for(let y=0;y<p.matrix.length;y++){
    for(let x=0;x<p.matrix[y].length;x++){
      if(p.matrix[y][x]){
        let nx=x+p.x;
        let ny=y+p.y;

        if(nx<0||nx>=COLS||ny>=ROWS) return true;
        if(ny>=0 && board[ny][nx]) return true;
      }
    }
  }
  return false;
}

function merge(board,p){
  p.matrix.forEach((row,y)=>{
    row.forEach((v,x)=>{
      if(v) board[y+p.y][x+p.x]=v;
    });
  });
}

function rotate(m){
  return m[0].map((_,i)=>m.map(r=>r[i]).reverse());
}

function updateHighScore(){
  if(score>highScore){
    highScore=score;
    localStorage.setItem("bookExchangeTetrisHighScore",highScore);
    highScoreEl.textContent=highScore;
  }
}

function playerReset(){
  const id=Math.floor(Math.random()*(pieces.length-1))+1;
  player.matrix=pieces[id];
  player.y=0;
  player.x=(COLS/2|0)-(player.matrix[0].length/2|0);

  if(collide(board,player)){
    updateHighScore();
    board.forEach(r=>r.fill(0));
    score=0;
    scoreEl.textContent=score;
  }
}

function sweep(){
  outer:for(let y=board.length-1;y>=0;y--){
    for(let x=0;x<COLS;x++){
      if(board[y][x]==0) continue outer;
    }

    const row=board.splice(y,1)[0].fill(0);
    board.unshift(row);
    y++;

    score+=10;
    scoreEl.textContent=score;
  }
}

function playerDrop(){
  player.y++;

  if(collide(board,player)){
    player.y--;
    merge(board,player);
    sweep();
    playerReset();
  }

  dropCounter=0;
}

function playerMove(dir){
  player.x+=dir;
  if(collide(board,player)) player.x-=dir;
}

function playerRotate(){
  const pos=player.x;
  let offset=1;

  player.matrix=rotate(player.matrix);

  while(collide(board,player)){
    player.x+=offset;
    offset=-(offset+(offset>0?1:-1));

    if(offset>player.matrix[0].length){
      player.matrix=rotate(player.matrix);
      player.matrix=rotate(player.matrix);
      player.matrix=rotate(player.matrix);
      player.x=pos;
      return;
    }
  }
}

let dropCounter=0;
let dropInterval=700;
let lastTime=0;

function update(time=0){
  const delta=time-lastTime;
  lastTime=time;

  dropCounter+=delta;

  if(dropCounter>dropInterval) playerDrop();

  draw();
  requestAnimationFrame(update);
}

const player={x:0,y:0,matrix:null};

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") playerMove(-1);
  if(e.key==="ArrowRight") playerMove(1);
  if(e.key==="ArrowDown") playerDrop();
  if(e.key==="ArrowUp") playerRotate();
});

playerReset();
update();
</script>

</body>
</html>
